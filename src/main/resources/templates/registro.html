<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Profesional - SIPE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/estilos.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">

            <div class="card border-0 shadow-lg rounded-0">
                <div class="card-body p-5">

                    <div class="text-center mb-4">
                        <h2 class="logo-box d-inline-block px-3 py-2 m-0 fs-4 text-uppercase tracking-wide">SIPE</h2>
                        <p class="text-muted mt-3 small">Registro de Nuevo Profesional</p>
                        <p class="text-muted small">Cree su cuenta para gestionar evaluaciones clínicas.</p>
                    </div>

                    <form action="/registro" method="POST">

                        <div class="mb-4">
                            <label for="nombre" class="form-label small fw-bold text-uppercase">Nombre Completo</label>
                            <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 rounded-0">
                                        <i class="fas fa-user text-muted"></i>
                                    </span>
                                <input type="text" class="form-control border-start-0 rounded-0 px-2 shadow-none"
                                       id="nombre" name="nombre" placeholder="Ej. Dr. Armando Casas" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="email" class="form-label small fw-bold text-uppercase">Correo Electrónico</label>
                            <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 rounded-0">
                                        <i class="fas fa-envelope text-muted"></i>
                                    </span>
                                <input type="email" class="form-control border-start-0 rounded-0 px-2 shadow-none"
                                       id="email" name="email" placeholder="ejemplo@doctor.com" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label small fw-bold text-uppercase">Contraseña</label>
                            <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 rounded-0">
                                        <i class="fas fa-lock text-muted"></i>
                                    </span>
                                <input type="password" class="form-control border-start-0 rounded-0 px-2 shadow-none"
                                       id="password" name="password" placeholder="Cree una contraseña segura" required>
                            </div>
                            <div class="form-text small mt-2">Mínimo 8 caracteres.</div>
                        </div>

                        <div class="d-grid mt-5">
                            <button type="submit"
                                    class="btn btn-dark rounded-0 py-2 text-uppercase tracking-wide fw-bold">Crear Cuenta</button>
                        </div>

                    </form>

                </div>
            </div>

            <div class="text-center mt-4">
                <p class="text-muted small">
                    ¿Ya tienes una cuenta activa? <br>
                    <a href="/login" class="text-dark fw-bold text-decoration-none border-bottom border-dark">Inicia Sesión aquí</a>
                </p>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/login.js"></script>
<script th:inline="javascript">
    window.alertaError = [[${alertaError}]];
    window.alertaSuccess = [[${alertaSuccess}]];
</script>
</body>

</html>
